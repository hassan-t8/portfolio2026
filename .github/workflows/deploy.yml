name: Deploy Portfolio to GitHub Pages

# CI/CD: runs on every push to main, then publishes to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual runs from the Actions tab

# Permissions needed for the Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel an in-progress run
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ---- CI: basic checks ----
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax-check JavaScript
        run: |
          for f in js/*.js; do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Verify required files exist
        run: |
          test -f index.html
          test -f admin.html
          test -f css/style.css
          echo "All required files present."

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: . # the whole repo is the static site

  # ---- CD: deploy to GitHub Pages ----
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
