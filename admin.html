<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- TOP BAR -->
  <header class="admin-bar">
    <div class="container">
      <div class="admin-title">⚙️ Portfolio <span>Settings</span></div>
      <div class="admin-actions">
        <a class="btn btn-ghost btn-sm" href="index.html" target="_blank">👁 View Site</a>
        <label class="btn btn-ghost btn-sm" style="cursor:pointer;">
          ⬆ Import
          <input type="file" id="importInput" accept="application/json" style="display:none;" />
        </label>
        <button class="btn btn-ghost btn-sm" id="exportBtn">⬇ Export</button>
        <button class="btn btn-ghost btn-sm" id="resetBtn">↺ Reset</button>
        <button class="btn btn-primary btn-sm" id="saveBtn">💾 Save Changes</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="admin-wrap">
      <!-- SIDE NAV -->
      <aside class="side">
        <a class="active" data-target="panel-profile">👤 Profile</a>
        <a data-target="panel-stats">📊 Stats</a>
        <a data-target="panel-skills">🛠 Skills</a>
        <a data-target="panel-experience">💼 Experience</a>
        <a data-target="panel-projects">🚀 Projects</a>
        <a data-target="panel-education">🎓 Education</a>
        <a data-target="panel-certs">📜 Certifications</a>
        <a data-target="panel-awards">🏆 Awards</a>
        <a data-target="panel-languages">🌐 Languages</a>
      </aside>

      <!-- PANELS -->
      <main>
        <div class="panel" id="panel-profile"></div>
        <div class="panel" id="panel-stats"></div>
        <div class="panel" id="panel-skills"></div>
        <div class="panel" id="panel-experience"></div>
        <div class="panel" id="panel-projects"></div>
        <div class="panel" id="panel-education"></div>
        <div class="panel" id="panel-certs"></div>
        <div class="panel" id="panel-awards"></div>
        <div class="panel" id="panel-languages"></div>
        <p class="subtle">💡 Tip: Click <b>Save Changes</b> to apply. Use <b>Export</b> to back up your data as a file, and <b>Import</b> to restore it (useful when deploying online).</p>
      </main>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
